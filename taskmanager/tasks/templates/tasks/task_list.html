{% extends "base.html" %}

{% block content %}

<h2>Lista de Tarefas</h2>

<a href="/create/">Criar nova tarefa</a>

<ul>
{% for task in tasks %}
    <li>
        {{ task.title }}

        {% if not task.completed %}
            <a href="/complete/{{ task.id }}/">Concluir</a>
        {% else %}
            (Concluída)
        {% endif %}

        <a href="/update/{{ task.id }}/">Editar</a>
        <a href="/delete/{{ task.id }}/">Deletar</a>
    </li>
{% endfor %}
</ul>

{% endblock %}
